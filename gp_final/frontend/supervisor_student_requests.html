<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Requests</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .page-sub { color: #64748b; font-size: 0.875rem; margin-bottom: 18px; }

    .flash { padding: 10px 14px; border-radius: 10px; margin-bottom: 14px; font-size: 13px; display: none; }
    .flash-ok  { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .flash-err { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }

    .card {
      background: #fff; border-radius: 14px;
      padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,.05);
    }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 10px; border-bottom: 1px solid #e2e8f0; font-size: 14px; text-align: left; }
    th { font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 600; }
    tr:last-child td { border-bottom: none; }

    .btn { border: 0; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.15s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ok { background: #22c55e; color: #fff; }
    .btn-ok:hover:not(:disabled) { background: #16a34a; }
    .btn-no { background: #ef4444; color: #fff; margin-left: 6px; }
    .btn-no:hover:not(:disabled) { background: #dc2626; }

    .status-badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 999px;
      background: #fef9c3; color: #854d0e;
    }

    .empty { color: #94a3b8; text-align: center; padding: 2rem; font-size: 13px; }
  </style>
</head>
<body>
  <aside id="supervisor-sidebar"></aside>

  <main class="main-content">
    <h1>Student Requests</h1>
    <p class="page-sub">Pending supervision requests directed to you — approve to assign the team, reject to pass to the next supervisor.</p>

    <div id="msg" class="flash"></div>

    <section class="card">
      <table>
        <thead>
          <tr>
            <th>Team</th>
            <th>Leader</th>
            <th>Project Idea</th>
            <th>Status</th>
            <th>Created</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="requestsBody">
          <tr><td colspan="6" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="/static/api.js?v=2"></script>
  <script src="/static/supervisor-common.js"></script>
  <script>
    GPNav.mount('requests');

    function showMsg(text, ok) {
      const m = document.getElementById('msg');
      m.textContent = text;
      m.className = 'flash ' + (ok ? 'flash-ok' : 'flash-err');
      m.style.display = 'block';
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    async function load() {
      const tbody = document.getElementById('requestsBody');
      tbody.innerHTML = '<tr><td colspan="6" class="empty">Loading…</td></tr>';
      try {
        const rows = await GPApi.requests();
        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty">No pending requests at the moment.</td></tr>';
          return;
        }
        tbody.innerHTML = rows.map((r) => `
          <tr data-id="${r.id}">
            <td><strong>${esc(r.team_name || 'Team')}</strong></td>
            <td>${esc(r.leader_name || '—')}</td>
            <td>${esc(r.project_idea || '—')}</td>
            <td><span class="status-badge">${esc(r.status)}</span></td>
            <td style="color:#64748b;font-size:12px">${esc((r.created_at || '').slice(0, 10))}</td>
            <td>
              <button class="btn btn-ok"  data-act="approve" data-id="${r.id}">Approve</button>
              <button class="btn btn-no"  data-act="reject"  data-id="${r.id}">Reject</button>
            </td>
          </tr>`).join('');

        tbody.querySelectorAll('button[data-act]').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const id = +btn.getAttribute('data-id');
            const decision = btn.getAttribute('data-act');
            btn.disabled = true;
            document.getElementById('msg').style.display = 'none';
            try {
              const data = await GPApi.decideRequest(id, decision);
              if (data.detail && !data.id) showMsg(data.detail, true);
              else showMsg(
                decision === 'approve'
                  ? 'Request approved and team assigned.'
                  : 'Rejection or pass recorded.',
                true
              );
              GPNav.updateUnreadBadge();
              await load();
            } catch (e) {
              showMsg(e.message, false);
              btn.disabled = false;
            }
          });
        });
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty">${esc(e.message)}</td></tr>`;
      }
    }

    load();
  </script>
</body>
</html>

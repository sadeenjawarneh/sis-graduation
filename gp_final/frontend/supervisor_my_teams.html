<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Teams</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .page-sub { color: #64748b; font-size: 0.875rem; margin-bottom: 18px; }

    .flash {
      padding: 10px 14px; border-radius: 10px;
      margin-bottom: 14px; font-size: 13px; display: none;
    }
    .flash-ok  { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .flash-err { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .team-card {
      background: #fff; border-radius: 14px;
      padding: 18px; box-shadow: 0 10px 25px rgba(0,0,0,.05);
    }
    .team-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .team-card .sub { color: #64748b; font-size: 0.82rem; margin-bottom: 10px; }
    .team-card p { font-size: 0.875rem; margin-bottom: 6px; }

    .progress { height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin: 10px 0 14px; }
    .progress-bar { height: 100%; background: #22c55e; }

    .field-row { display: flex; align-items: flex-end; gap: 8px; margin-top: 12px; }
    .field-row label { font-size: 12px; font-weight: 600; color: #475569; }
    .field-row input[type=date] {
      border: 1px solid #cbd5e1; border-radius: 8px;
      padding: 8px 10px; font-size: 13px; flex: 1;
    }

    .comment-label { font-size: 12px; font-weight: 600; color: #475569; margin-top: 14px; margin-bottom: 6px; display: block; }
    .comment-ta {
      width: 100%; border: 1px solid #cbd5e1; border-radius: 8px;
      padding: 8px 10px; font-size: 13px; resize: vertical; min-height: 64px;
      font-family: inherit;
    }

    .btn { border: 0; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.15s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-blue  { background: #2563eb; color: #fff; }
    .btn-blue:hover:not(:disabled)  { background: #1d4ed8; }
    .btn-gray  { background: #e2e8f0; color: #1e293b; }
    .btn-gray:hover:not(:disabled)  { background: #cbd5e1; }

    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .btn-green { background: #16a34a; color: #fff; }
    .btn-green:hover:not(:disabled) { background: #15803d; }

    .empty { color: #94a3b8; text-align: center; padding: 2rem; }

    /* Exam date chips */
    .exam-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0 10px; }
    .exam-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fef3c7; color: #92400e;
      border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 600;
    }
    .exam-chip button {
      border: none; background: none; cursor: pointer;
      color: #b45309; font-size: 14px; line-height: 1;
      padding: 0; display: flex; align-items: center;
    }
    .exam-chip button:hover { color: #dc2626; }
    .exam-label { font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 4px; display: block; }
  </style>
</head>
<body>
  <aside id="supervisor-sidebar"></aside>

  <main class="main-content">
    <h1>My Teams</h1>
    <p class="page-sub">Accepted teams assigned to you — add exam dates and send comments as notifications.</p>

    <div id="msg" class="flash"></div>
    <div id="teams"></div>
  </main>

  <script src="/static/api.js?v=2"></script>
  <script src="/static/supervisor-common.js"></script>
  <script>
    GPNav.mount('teams');

    function flash(text, ok) {
      const m = document.getElementById('msg');
      m.textContent = text;
      m.className = 'flash ' + (ok ? 'flash-ok' : 'flash-err');
      m.style.display = 'block';
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    async function load() {
      const root = document.getElementById('teams');
      root.innerHTML = '<p class="empty">Loading…</p>';
      try {
        const teams = await GPApi.teams();
        if (!teams.length) {
          root.innerHTML = '<p class="empty">No teams assigned to you yet.</p>';
          return;
        }

        root.innerHTML = `<div class="teams-grid">${teams.map((t) => {
          const members = (t.members || []).map((m) => esc(m.display_name || m.email)).join(', ') || '—';
          const prog    = Math.min(100, (t.progress ?? 0));
          const examChips = (t.exam_dates || []).length
            ? (t.exam_dates || []).map((e) =>
                `<span class="exam-chip">
                   <i class="fas fa-star" style="font-size:10px"></i> ${esc(String(e.date))}
                   <button type="button" class="del-exam-btn" data-team="${t.id}" data-date="${esc(String(e.date))}" title="Remove">×</button>
                 </span>`).join('')
            : '<span style="font-size:12px;color:#94a3b8">No exam dates set</span>';

          return `
          <div class="team-card" id="team-${t.id}">
            <h3>${esc(t.name)}</h3>
            <p class="sub">${esc(t.project_title || '')}</p>
            <p>${esc(t.project_description || '')}</p>
            <div class="progress"><div class="progress-bar" style="width:${prog}%"></div></div>
            <p><strong>Status:</strong> ${esc(t.status)} &nbsp;·&nbsp; <strong>Progress:</strong> ${prog}%</p>
            <p><strong>Members:</strong> ${members}</p>

            <span class="exam-label"><i class="fas fa-calendar-check"></i> Exam Dates</span>
            <div class="exam-chips">${examChips}</div>

            <div class="field-row">
              <div style="flex:1">
                <label>Add Exam Date</label>
                <input type="date" class="exam-date-input" data-team="${t.id}" />
              </div>
              <button type="button" class="btn btn-blue add-exam-btn" data-team="${t.id}">+ Add</button>
            </div>

            <span class="comment-label">Comment for team (sent as notification to all members)</span>
            <textarea class="comment-ta" data-team="${t.id}" placeholder="Comment text…"></textarea>
            <div class="btn-row">
              <button type="button" class="btn btn-gray send-comment-btn" data-team="${t.id}">Send Comment</button>
              <button type="button" class="btn btn-green open-chat-btn" data-team='${JSON.stringify({id:t.id,name:t.name,members_info:t.members||[]})}'>
                <i class="fas fa-comments"></i> Open Chat
              </button>
            </div>
          </div>`;
        }).join('')}</div>`;

        // Add exam date
        root.querySelectorAll('.add-exam-btn').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const tid = +btn.getAttribute('data-team');
            const inp = root.querySelector(`.exam-date-input[data-team="${tid}"]`);
            if (!inp.value) return flash('Please select a date', false);
            btn.disabled = true;
            try {
              await GPApi.addExamDate(tid, inp.value);
              inp.value = '';
              flash('Exam date added successfully.', true);
              GPNav.updateUnreadBadge();
              await load();
            } catch (e) { flash(e.message, false); }
            finally { btn.disabled = false; }
          });
        });

        // Delete exam date
        root.querySelectorAll('.del-exam-btn').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const tid  = +btn.getAttribute('data-team');
            const date = btn.getAttribute('data-date');
            if (!confirm(`Remove exam date ${date}?`)) return;
            btn.disabled = true;
            try {
              await GPApi.apiFetch(`/teams/${tid}/exam-dates/`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date }),
              });
              flash('Exam date removed.', true);
              await load();
            } catch (e) { flash(e.message || 'Failed to remove date.', false); }
          });
        });

        // Open Chat button
        root.querySelectorAll('.open-chat-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            const teamData = JSON.parse(btn.getAttribute('data-team'));
            localStorage.setItem('currentTeam', JSON.stringify(teamData));
            location.href = '/chat.html';
          });
        });

        root.querySelectorAll('.send-comment-btn').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const tid = +btn.getAttribute('data-team');
            const ta  = root.querySelector(`.comment-ta[data-team="${tid}"]`);
            const comment = (ta.value || '').trim();
            if (!comment) return flash('Please write a comment first', false);
            btn.disabled = true;
            try {
              await GPApi.teamComment(tid, comment);
              ta.value = '';
              flash('Comment sent successfully.', true);
              GPNav.updateUnreadBadge();
            } catch (e) { flash(e.message, false); }
            finally { btn.disabled = false; }
          });
        });

      } catch (e) {
        root.innerHTML = `<p class="empty">${esc(e.message)}</p>`;
      }
    }

    load();
  </script>
</body>
</html>

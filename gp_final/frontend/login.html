<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graduation Project | Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    input::-ms-reveal,input::-ms-clear{display:none!important}
    body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(to bottom,#e6f3ff,#f7f9fc);display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
    .login-container{background:#fff;border-radius:20px;box-shadow:0 8px 25px rgba(0,0,0,.15);width:95%;max-width:400px;padding:30px 20px;text-align:center;box-sizing:border-box}
    .graduation-cap{width:100px;margin-bottom:-30px}
    h1{font-size:22px;color:#1a237e;margin-bottom:10px}
    p.sub{font-size:14px;color:#555;margin-bottom:20px}
    .input-group{margin-bottom:18px;text-align:left}
    .input-label{display:flex;align-items:center;font-size:14px;color:#1a237e;margin-bottom:6px;gap:6px;font-weight:600}
    .input-with-icon{position:relative;width:100%}
    .input-with-icon input{width:100%;padding:10px 40px 10px 12px;border:1px solid #ccc;border-radius:8px;font-size:14px;outline:none;height:40px;box-sizing:border-box;transition:.3s}
    .inside-icon{position:absolute;top:50%;right:12px;transform:translateY(-50%);font-size:16px;color:#888}
    .eye-clickable{cursor:pointer;color:#1a237e!important}
    .error-msg{color:#d32f2f;font-size:12px;margin-top:6px;display:none;font-weight:500;padding:8px;background:#ffebee;border-radius:6px}
    .form-footer{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .remember-me{display:flex;align-items:center;font-size:13px;color:#555}
    .forgot a{color:#1a237e;text-decoration:none;font-size:12px}
    .login-btn{width:100%;padding:12px;background:#1a237e;color:#fff;font-size:15px;border:none;border-radius:8px;cursor:pointer;transition:.3s;font-weight:700}
    .login-btn:hover:not(:disabled){background:#0d1452}
    .login-btn:disabled{background:#ccc;cursor:not-allowed}
    footer{margin-top:15px;font-size:11px;color:#aaa}
</style>
</head>
<body>
<div class="login-container">
    <img src="https://i.postimg.cc/SxXx9DRT/Whats-App-Image-2025-12-24-at-11-49-04-PM.jpg" alt="Logo" class="graduation-cap">
    <h1>Welcome to Your Graduation Journey!</h1>
    <p class="sub">Your next step to graduation!</p>

    <div id="errorBox" class="error-msg"></div>

    <div class="input-group">
        <label class="input-label"><i class="fas fa-envelope"></i> Email Address</label>
        <div class="input-with-icon">
            <i class="fas fa-user inside-icon"></i>
            <input type="email" id="email" placeholder="Enter your Email">
        </div>
        <div id="email-error" class="error-msg"></div>
    </div>

    <div class="input-group">
        <label class="input-label"><i class="fas fa-lock"></i> Password</label>
        <div class="input-with-icon">
            <i class="fas fa-lock inside-icon" id="passIcon"></i>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        <div id="password-error" class="error-msg"></div>
    </div>

    <div class="form-footer">
        <div class="remember-me">
            <input type="checkbox" id="remember">
            <label for="remember" style="margin-left:5px">Remember Me</label>
        </div>
        <div class="forgot"><a href="#">Forgot Password?</a></div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">Login</button>
    <footer><p>Graduation Project Management System</p></footer>
</div>

<script src="/static/api.js?v=2"></script>
<script>
    // Redirect if already logged in
    if (localStorage.getItem('access')) {
    const u = JSON.parse(localStorage.getItem('user') || '{}');
    if (u.role === 'admin') location.href = '/admin.html';
    else if (u.role === 'supervisor') location.href = '/Supervisor_dashboard.html';
    else location.href = '/student_dashboard.html';
}

    // Toggle password visibility
    document.getElementById('passIcon').addEventListener('click', function() {
        if (!this.classList.contains('eye-clickable')) return;
        const inp = document.getElementById('password');
        inp.type = inp.type === 'password' ? 'text' : 'password';
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
    document.getElementById('password').addEventListener('input', function() {
        const icon = document.getElementById('passIcon');
        icon.className = this.value
            ? 'fas fa-eye inside-icon eye-clickable'
            : 'fas fa-lock inside-icon';
    });

    let _failCount = 0;
    const _LOCK_LIMIT = 5;

    function _hideErrors() {
        ['errorBox','email-error','password-error'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
        });
    }
    function _showError(id, msg) {
        const el = document.getElementById(id);
        if (el) { el.textContent = msg; el.style.display = 'block'; }
    }

    async function doLogin() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('loginBtn');

        _hideErrors();

        if (!email) {
            _showError('email-error', 'Please enter your email address.');
            return;
        }
        if (!password) {
            _showError('password-error', 'Please enter your password.');
            return;
        }

        btn.disabled    = true;
        btn.textContent = 'Logging in…';

        try {
            const user = await GPApi.login(email, password);
            _failCount = 0;
            if (user.role === 'admin') location.href = '/admin.html';
            else if (user.role === 'supervisor') location.href = '/Supervisor_dashboard.html';
            else location.href = '/student_dashboard.html';
        } catch (err) {
            _failCount++;
            if (_failCount >= _LOCK_LIMIT) {
                _showError('email-error', 'Account blocked for 10 minutes due to too many failed attempts.');
                // keep button disabled
            } else {
                _showError('email-error', err.detail || err.error || 'Incorrect email or password.');
                btn.disabled    = false;
                btn.textContent = 'Login';
            }
        }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>

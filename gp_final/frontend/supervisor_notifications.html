<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .page-sub { color: #64748b; font-size: 0.875rem; margin-bottom: 18px; }

    .flash { padding: 10px 14px; border-radius: 10px; margin-bottom: 14px; font-size: 13px; display: none; }
    .flash-ok  { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .flash-err { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .count-label { font-size: 13px; color: #64748b; margin-left: auto; }

    .btn { border: 0; padding: 9px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.15s; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-light   { background: #e2e8f0; color: #1e293b; }
    .btn-light:hover { background: #cbd5e1; }
    .btn-light.active { background: #1e293b; color: #fff; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost   { background: transparent; color: #64748b; border: 1px solid #e2e8f0; }
    .btn-ghost:hover { color: #0f172a; border-color: #94a3b8; }

    /* Notification items */
    .notif-list { display: grid; gap: 10px; }

    .notif-item {
      background: #fff; border-radius: 12px;
      border: 1px solid #e2e8f0; padding: 14px 16px;
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 12px;
    }
    .notif-item.unread {
      border-color: #93c5fd; background: #eff6ff;
      border-left: 4px solid #2563eb;
    }

    .notif-body { flex: 1; }
    .notif-title { font-weight: 700; font-size: 14px; color: #0f172a; margin-bottom: 4px; }
    .notif-msg   { font-size: 13px; color: #374151; margin-bottom: 6px; }
    .notif-meta  { font-size: 11px; color: #94a3b8; }
    .unread-dot  { font-size: 11px; font-weight: 700; color: #2563eb; margin-left: 6px; }

    .notif-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-sm { border: 0; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-sm-ghost  { background: #f1f5f9; color: #475569; }
    .btn-sm-ghost:hover { background: #e2e8f0; }
    .btn-sm-danger { background: #fef2f2; color: #ef4444; }
    .btn-sm-danger:hover { background: #fee2e2; }

    .empty { color: #94a3b8; text-align: center; padding: 2rem; font-size: 13px; }
  </style>
</head>
<body>
  <aside id="supervisor-sidebar"></aside>

  <main class="main-content">
    <h1>Notification Center</h1>
    <p class="page-sub">Supervision requests, file uploads, meetings, and grading — mark as read or delete.</p>

    <div id="msg" class="flash"></div>

    <div class="toolbar">
      <button class="btn btn-primary" id="btn-all-read">Mark All as Read</button>
      <button class="btn btn-light active" id="filter-all">All</button>
      <button class="btn btn-light" id="filter-unread">Unread Only</button>
      <button class="btn btn-ghost" id="btn-refresh">Refresh</button>
      <span class="count-label" id="count-label"></span>
    </div>

    <div id="list" class="notif-list"></div>
  </main>

  <script src="/static/api.js?v=2"></script>
  <script src="/static/supervisor-common.js"></script>
  <script>
    GPNav.mount('notifications');

    let allRows = [];
    let mode = 'all'; // 'all' | 'unread'

    function flash(text, ok) {
      const m = document.getElementById('msg');
      m.textContent = text;
      m.className = 'flash ' + (ok ? 'flash-ok' : 'flash-err');
      m.style.display = 'block';
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function renderList() {
      const rows = mode === 'unread' ? allRows.filter((n) => !n.is_read) : allRows;
      const unread = allRows.filter((n) => !n.is_read).length;
      document.getElementById('count-label').textContent =
        `${rows.length} item(s)${unread ? ' · ' + unread + ' unread' : ''}`;

      const list = document.getElementById('list');
      if (!rows.length) {
        list.innerHTML = `<p class="empty">${mode === 'unread' ? 'No unread notifications.' : 'No notifications.'}</p>`;
        return;
      }

      list.innerHTML = rows.map((n) => `
        <div class="notif-item ${n.is_read ? '' : 'unread'}" data-id="${n.id}">
          <div class="notif-body">
            <div class="notif-title">
              ${esc(n.title)}
              ${n.is_read ? '' : '<span class="unread-dot">● Unread</span>'}
            </div>
            <div class="notif-msg">${esc(n.message)}</div>
            <div class="notif-meta">
              ${esc(n.notif_type)}${n.team_name ? ' · ' + esc(n.team_name) : ''}
              · ${esc((n.created_at || '').slice(0, 19).replace('T', ' '))}
            </div>
          </div>
          <div class="notif-actions">
            ${n.is_read ? '' : `<button class="btn-sm btn-sm-ghost btn-read" data-id="${n.id}">Mark Read</button>`}
            <button class="btn-sm btn-sm-danger btn-del" data-id="${n.id}">Delete</button>
          </div>
        </div>`).join('');

      list.querySelectorAll('.btn-read').forEach((btn) => {
        btn.addEventListener('click', async () => {
          try {
            await GPApi.notifMarkRead(+btn.getAttribute('data-id'));
            GPNav.updateUnreadBadge();
            await loadAll();
          } catch (e) { flash(e.message, false); }
        });
      });
      list.querySelectorAll('.btn-del').forEach((btn) => {
        btn.addEventListener('click', async () => {
          try {
            await GPApi.notifDelete(+btn.getAttribute('data-id'));
            GPNav.updateUnreadBadge();
            await loadAll();
          } catch (e) { flash(e.message, false); }
        });
      });
    }

    async function loadAll() {
      const list = document.getElementById('list');
      list.innerHTML = '<p class="empty">Loading…</p>';
      try {
        allRows = await GPApi.notifications(false);
        renderList();
        GPNav.updateUnreadBadge();
      } catch (e) {
        list.innerHTML = `<p class="empty">${esc(e.message)}</p>`;
      }
    }

    // Toolbar
    document.getElementById('filter-all').addEventListener('click', () => {
      mode = 'all';
      document.getElementById('filter-all').classList.add('active');
      document.getElementById('filter-unread').classList.remove('active');
      renderList();
    });
    document.getElementById('filter-unread').addEventListener('click', () => {
      mode = 'unread';
      document.getElementById('filter-unread').classList.add('active');
      document.getElementById('filter-all').classList.remove('active');
      renderList();
    });
    document.getElementById('btn-refresh').addEventListener('click', loadAll);
    document.getElementById('btn-all-read').addEventListener('click', async () => {
      try {
        await GPApi.notifMarkAllRead();
        flash('All notifications marked as read.', true);
        GPNav.updateUnreadBadge();
        await loadAll();
      } catch (e) { flash(e.message, false); }
    });

    loadAll();
  </script>
</body>
</html>

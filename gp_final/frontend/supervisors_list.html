<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Select Supervisor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% load static %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:#f4f7fc;padding:30px;color:#1e293b}
.container{max-width:820px;margin:0 auto}
.header{display:flex;align-items:center;gap:15px;margin-bottom:20px}
.back-btn{background:#fff;border:1px solid #ddd;padding:8px 14px;border-radius:8px;cursor:pointer;color:#1a237e;text-decoration:none;font-size:13px;font-weight:600;transition:.2s}
.back-btn:hover{background:#1a237e;color:#fff}
h1{font-size:22px;color:#1a237e}
p.desc{color:#64748b;font-size:13px;margin-top:4px}
.info-bar{background:#e0e7ff;color:#3730a3;padding:10px 15px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.list{display:flex;flex-direction:column;gap:14px}
.sup-card{background:#fff;padding:16px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 12px rgba(0,0,0,.05);border:1px solid transparent;transition:.3s}
.sup-card:hover{transform:translateY(-2px);border-color:#1a237e;box-shadow:0 8px 20px rgba(0,0,0,.08)}
.info{display:flex;align-items:center;gap:14px}
.avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid #f0f4ff}
.details b{font-size:15px;color:#1a237e;display:block}
.details span{font-size:12px;color:#64748b}
.req-btn{background:#28a745;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;min-width:140px;transition:.2s}
.req-btn.sent{background:#d32f2f}
.req-btn:hover{opacity:.85}
.priority-tag{font-size:11px;background:#e0e7ff;color:#3730a3;padding:2px 8px;border-radius:10px;margin-left:6px}
.spinner{text-align:center;padding:40px;color:#94a3b8}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="/supervisor-request.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        <div>
            <h1>Academic Supervisors</h1>
            <p class="desc">Select up to 3 preferred supervisors for your project</p>
        </div>
    </div>

    <div class="info-bar" id="infoBar">
        <i class="fas fa-circle-info"></i> <span id="infoText">Loading…</span>
    </div>

    <div class="list" id="supList">
        <div class="spinner"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
    </div>

    <div id="confirmBar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1a237e;color:#fff;padding:14px 24px;display:none;align-items:center;justify-content:space-between;z-index:999;">
        <span id="confirmBarText">0 supervisor(s) selected</span>
        <button onclick="confirmSelection()" style="background:#28a745;color:#fff;border:none;padding:10px 22px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;">
            ✓ Confirm Selection
        </button>
    </div>
</div>

<script src="/static/api.js?v=2"></script>
<script>
    if (!GPApi.getAccess()) location.href = '/login.html';

    let supervisors = [], myRequests = [], team = null;

    async function loadAll() {
        const t = await Teams.myTeam();
        if (!t) { location.href = '/student_dashboard.html'; return; }
        team = t;

        // جلب المشرفين المتاحين
        supervisors = await Teams.supervisors();
        
        // جلب طلبات الفريق الحالية المخزنة في الـ Backend
        try {
            const response = await fetch(`/api/v1/requests/?team_id=${team.id}`, {
                headers: { 'Authorization': 'Bearer ' + GPApi.getAccess() }
            });
            const data = await response.json();
            if (data && data.length > 0 && data[0].preferences) {
                myRequests = data[0].preferences; 
            } else {
                myRequests = [];
            }
        } catch(e) {
            myRequests = [];
        }
        
        render();
    }

    function render() {
        document.getElementById('infoText').textContent =
            `Team: ${team.name} — Selected: ${myRequests.length}/3 supervisors`;

        const list = document.getElementById('supList');
        list.innerHTML = '';

        supervisors.forEach((sup, idx) => {
            // الفحص الصحيح بناءً على مصفوفة الـ IDs الحالية
            const isSelected = myRequests.includes(sup.id);
            const priority  = isSelected ? myRequests.indexOf(sup.id) + 1 : null;

            list.innerHTML += `
                <div class="sup-card">
                    <div class="info">
                        <img class="avatar"
                             src="https://ui-avatars.com/api/?name=${encodeURIComponent(sup.display_name)}&background=1a237e&color=fff"
                             alt="${sup.display_name}">
                        <div class="details">
                            <b>${sup.display_name}
                                ${isSelected ? `<span class="priority-tag">Priority ${priority}</span>` : ''}
                            </b>
                            <span>Software Engineering Department</span>
                        </div>
                    </div>
                    <button class="req-btn ${isSelected ? 'sent' : ''}"
                            onclick="toggleSelect(${sup.id})">
                        ${isSelected ? 'Cancel Request' : 'Send Request'}
                    </button>
                </div>`;
        });
    }

    function toggleSelect(supId) {
        const index = myRequests.indexOf(supId);
        if (index > -1) {
            myRequests.splice(index, 1);
        } else {
            if (myRequests.length >= 3) {
                alert('You can only select up to 3 preferred supervisors.');
                return;
            }
            myRequests.push(supId);
        }
        render();
        updateConfirmBar();
    }

    function updateConfirmBar() {
        const bar = document.getElementById('confirmBar');
        const txt = document.getElementById('confirmBarText');
        if (myRequests.length > 0) {
            bar.style.display = 'flex';
            txt.textContent = `${myRequests.length} supervisor(s) selected (Priority order)`;
        } else {
            bar.style.display = 'none';
        }
    }

    function confirmSelection() {
        if (myRequests.length === 0) return;
        // Save ordered list of IDs for supervisor-request.html
        localStorage.setItem('selectedSupervisors', JSON.stringify(myRequests));
        // Also save first selection as legacy key for backward compat
        const firstSup = supervisors.find(s => s.id === myRequests[0]);
        if (firstSup) {
            localStorage.setItem('selectedSupervisor', JSON.stringify({ id: firstSup.id, name: firstSup.display_name }));
        }
        window.location.href = '/supervisor-request.html';
    }

    loadAll();
</script>
</body>
</html>
